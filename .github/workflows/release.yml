name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            backend_exe: optionsscout-backend
          - os: windows-latest
            backend_exe: optionsscout-backend.exe

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend binary with PyInstaller
        working-directory: backend
        run: |
          pyinstaller --noconfirm --clean --name optionsscout-backend --onedir --collect-all yfinance --collect-all pandas --collect-all numpy --hidden-import flask --hidden-import flask.json.provider --hidden-import requests app.py

      - name: Verify backend binary exists
        shell: bash
        run: |
          ls -la backend/dist/optionsscout-backend/
          test -f "backend/dist/optionsscout-backend/${{ matrix.backend_exe }}"

      - name: Install Node dependencies
        run: npm ci

      - name: Build & publish Electron installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
